# Production Nginx Configuration for TopShelf Inventory
# Domain: www.topshelfinventory.com
# App Path: /srv/bar_stock_app

server {
    listen 80;
    listen [::]:80;
    server_name www.topshelfinventory.com topshelfinventory.com;

    # Redirect all HTTP traffic to HTTPS
    # (Comment this out if you haven't set up SSL/Certbot yet)
    return 301 https://www.$host$request_uri;
}

server {
    # Listen on port 443 for SSL (Uncomment if using SSL)
    # listen 443 ssl http2;
    # listen [::]:443 ssl http2;
    # server_name www.topshelfinventory.com topshelfinventory.com;

    # SSL Certificates (Managed by Certbot usually)
    # ssl_certificate /etc/letsencrypt/live/topshelfinventory.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/topshelfinventory.com/privkey.pem;

    # Static Asset Caching - Optimize Next.js delivery
    location /_next/static/ {
        alias /srv/bar_stock_app/.next/static/;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /static/ {
        alias /srv/bar_stock_app/public/;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Proxy all other traffic to the Next.js Node server
    location / {
        # Ensure this matches the port your Next.js app runs on (5400)
        proxy_pass http://127.0.0.1:5400;
        
        # Standard proxy headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Real IP headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Log files
    access_log /var/log/nginx/topshelf.access.log;
    error_log /var/log/nginx/topshelf.error.log;
}
