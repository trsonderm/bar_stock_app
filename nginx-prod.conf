# Production Nginx Configuration for TopShelf Inventory
# Domain: www.topshelfinventory.com
# App Path: /srv/bar_stock_app

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name www.topshelfinventory.com topshelfinventory.com;
    return 301 https://www.topshelfinventory.com$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.topshelfinventory.com topshelfinventory.com;

    ssl_certificate     /etc/letsencrypt/live/topshelfinventory.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/topshelfinventory.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Larger body for image uploads (barred person photos, logos, etc.)
    client_max_body_size 20M;

    # Proxy all traffic to the Next.js app
    location / {
        proxy_pass http://127.0.0.1:6050;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Prevent mobile API requests from timing out on slow queries
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    access_log /var/log/nginx/topshelf.access.log;
    error_log  /var/log/nginx/topshelf.error.log;
}
